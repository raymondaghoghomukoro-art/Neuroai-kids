<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NeuroAI Kids</title>

<style>
body{
font-family: Arial, sans-serif;
margin:0;
background: linear-gradient(135deg,#667eea,#764ba2);
color:white;
text-align:center;
}

/* LANDING */
#landing{
padding:20px;
}

.card{
background:white;
color:#333;
padding:20px;
margin:15px auto;
border-radius:15px;
max-width:500px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#ff7a18;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#ff5500;
}

/* CHAT */
#chatUI{
display:none;
height:100vh;
background:#0f172a;
flex-direction:column;
}

header{
padding:15px;
background:#1e293b;
font-weight:bold;
}

.chat{
flex:1;
overflow-y:auto;
padding:15px;
}

.message{
margin:10px;
padding:10px;
border-radius:10px;
max-width:70%;
}

.user{
background:#3b82f6;
margin-left:auto;
}

.ai{
background:#334155;
}

.input-area{
display:flex;
padding:10px;
background:#1e293b;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
outline:none;
}

</style>
</head>

<body>

<!-- LANDING -->
<div id="landing">
<h1>🎈 NeuroAI Kids</h1>
<p>Fun, Safe & Smart AI for Kids 🚀</p>

<div class="card">
<h3>🧠 Learn Anything</h3>
<p>Ask questions and get simple answers!</p>
</div>

<div class="card">
<h3>🎨 Be Creative</h3>
<p>Create stories and ideas!</p>
</div>

<div class="card">
<h3>🔒 Safe AI</h3>
<p>Friendly and safe experience.</p>
</div>

<br>
<button onclick="startChat()">Start Chatting 🎈</button>
</div>

<!-- CHAT -->
<div id="chatUI">
<header>🎈 NeuroAI Kids</header>

<div class="chat" id="chat"></div>

<div class="input-area">
<input id="input" placeholder="Ask anything..." />
<button onclick="send()">Send</button>
</div>
</div>

<script>

// SWITCH TO CHAT + ✅ WELCOME MESSAGE
function startChat(){
  document.getElementById("landing").style.display = "none";
  document.getElementById("chatUI").style.display = "flex";

  addMessage("Hi 👋 I’m NeuroAI Kids! Ask me anything 🎈","ai");
}

// SESSION MEMORY
let sessionId = localStorage.getItem("kidsSession");

if (!sessionId) {
  sessionId = "kids-" + Math.random().toString(36).substring(2);
  localStorage.setItem("kidsSession", sessionId);
}

// ADD MESSAGE
function addMessage(text, sender){
  const chat = document.getElementById("chat");
  const msg = document.createElement("div");
  msg.className = "message " + sender;
  msg.innerText = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

// SEND MESSAGE
async function send(){
  const input = document.getElementById("input");
  const text = input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value = "";

  // ✅ LOADING EFFECT
  const loading = document.createElement("div");
  loading.className = "message ai";
  loading.innerText = "Typing...";
  document.getElementById("chat").appendChild(loading);

  try{
    const res = await fetch("https://neuroai-backend-2.onrender.com/api/ask",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        message: text,
        mode: "kids",
        sessionId: sessionId
      })
    });

    const data = await res.json();

    loading.remove();
    addMessage(data.reply || "No response","ai");

  }catch{
    loading.remove();
    addMessage("⚠️ Error connecting","ai");
  }
}

// ENTER KEY
document.getElementById("input").addEventListener("keypress",function(e){
  if(e.key==="Enter") send();
});

</script>

</body>
</html>
