<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NeuroAI Kids</title>

<style>
body{
margin:0;
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#667eea,#764ba2);
color:white;
text-align:center;
}

/* LANDING */
#landing{
padding:20px;
}

.card{
background:white;
color:#333;
padding:20px;
margin:15px auto;
border-radius:15px;
max-width:500px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

/* CHAT */
#chatUI{
display:none;
height:100vh;
background:#0f172a;
color:white;
flex-direction:column;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#1e293b;
}

.points{
background:#22c55e;
padding:5px 10px;
border-radius:10px;
}

.character{
font-size:40px;
margin-top:10px;
}

.chat{
flex:1;
overflow-y:auto;
padding:15px;
}

.message{
margin:10px;
padding:12px;
border-radius:12px;
max-width:70%;
}

.user{
background:#3b82f6;
margin-left:auto;
}

.ai{
background:#334155;
}

.input-area{
display:flex;
padding:10px;
background:#1e293b;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
}

button{
padding:12px 16px;
border:none;
border-radius:10px;
background:#ff7a18;
color:white;
cursor:pointer;
margin:5px;
}

button:hover{
background:#ff5500;
}

#gamePanel{
display:none;
padding:20px;
}
</style>
</head>

<body>

<!-- 🎨 LANDING PAGE -->
<div id="landing">
<h1>🎈 NeuroAI Kids</h1>
<p>Fun, Safe & Smart AI for Kids 🚀</p>

<div class="card">
<h3>🧠 Learn Anything</h3>
<p>Ask questions and get simple answers!</p>
</div>

<div class="card">
<h3>🎨 Be Creative</h3>
<p>Create stories and ideas!</p>
</div>

<div class="card">
<h3>🔒 Safe AI</h3>
<p>Friendly and safe experience.</p>
</div>

<br>
<button onclick="startApp()">Start Chatting 🎈</button>
</div>

<!-- 💬 CHAT APP -->
<div id="chatUI">

<header>
🎈 NeuroAI Kids
<div class="points">⭐ <span id="points">0</span></div>
</header>

<div class="character">🧸</div>

<div class="chat" id="chat"></div>

<div class="input-area">
<input id="input" placeholder="Ask anything..." />
<button onclick="send()">Send</button>
<button onclick="startVoice()">🎤</button>
<button onclick="openGame()">🎮</button>
</div>

<div id="gamePanel">
<h2>🎮 Math Game</h2>
<p id="question"></p>
<input id="answer" placeholder="Answer..." />
<br><br>
<button onclick="checkAnswer()">Submit</button>
</div>

</div>

<script>

// 🔁 SWITCH TO APP
function startApp(){
  document.getElementById("landing").style.display = "none";
  document.getElementById("chatUI").style.display = "flex";

  addMessage("Hi 👋 I’m your AI friend 🧸! Let's learn and play 🎈","ai");
}

// 🏆 POINTS
let points = 0;
function addPoints(n){
  points += n;
  document.getElementById("points").innerText = points;
}

// 🧠 SESSION
let sessionId = localStorage.getItem("kidsSession");
if (!sessionId) {
  sessionId = "kids-" + Math.random().toString(36).substring(2);
  localStorage.setItem("kidsSession", sessionId);
}

// 💬 MESSAGE
function addMessage(text, sender){
  const chat = document.getElementById("chat");
  const msg = document.createElement("div");
  msg.className = "message " + sender;
  msg.innerText = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

// 🔊 SPEAK
function speak(text){
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-US";
  window.speechSynthesis.speak(speech);
}

// 🚀 SEND
async function send(){
  const input = document.getElementById("input");
  const text = input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value = "";

  const loading = document.createElement("div");
  loading.className = "message ai";
  loading.innerText = "Thinking...";
  document.getElementById("chat").appendChild(loading);

  try{
    const res = await fetch("https://neuroai-backend-2.onrender.com/api/ask",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        message: text,
        mode: "kids",
        sessionId: sessionId
      })
    });

    const data = await res.json();
    loading.remove();

    const reply = data.reply || "No response";
    addMessage(reply,"ai");
    speak(reply);
    addPoints(5);

  }catch{
    loading.remove();
    addMessage("⚠️ Error","ai");
  }
}

// 🎤 VOICE
function startVoice(){
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-US";

  recognition.onresult = function(event){
    const text = event.results[0][0].transcript;
    document.getElementById("input").value = text;
    send();
  };

  recognition.start();
}

// 🎮 GAME
let correctAnswer = 0;

function openGame(){
  document.getElementById("gamePanel").style.display = "block";
  generateQuestion();
}

function generateQuestion(){
  const a = Math.floor(Math.random()*10);
  const b = Math.floor(Math.random()*10);
  correctAnswer = a + b;
  document.getElementById("question").innerText = `What is ${a} + ${b}?`;
}

function checkAnswer(){
  const userAnswer = document.getElementById("answer").value;

  if(parseInt(userAnswer) === correctAnswer){
    alert("🎉 Correct!");
    addPoints(10);
  } else {
    alert("❌ Try again!");
  }

  generateQuestion();
}

// ENTER
document.getElementById("input").addEventListener("keypress",function(e){
  if(e.key==="Enter") send();
});

</script>

</body>
</html>
