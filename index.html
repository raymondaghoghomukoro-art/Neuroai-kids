<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NeuroAI Kids</title>

<style>
body{
margin:0;
font-family: Arial, sans-serif;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#1e293b;
}

.points{
background:#22c55e;
padding:5px 10px;
border-radius:10px;
}

/* CHARACTER */
.character{
text-align:center;
font-size:50px;
margin-top:10px;
}

/* CHAT */
.chat{
flex:1;
overflow-y:auto;
padding:15px;
}

.message{
margin:10px;
padding:12px;
border-radius:12px;
max-width:70%;
}

.user{
background:#3b82f6;
margin-left:auto;
}

.ai{
background:#334155;
}

/* INPUT */
.input-area{
display:flex;
padding:10px;
background:#1e293b;
}

input{
flex:1;
padding:12px;
border-radius:10px;
border:none;
}

button{
padding:10px 14px;
border:none;
border-radius:10px;
background:#f97316;
color:white;
cursor:pointer;
}

/* GAME */
#gamePanel{
display:none;
padding:20px;
text-align:center;
}

</style>
</head>

<body>

<header>
🎈 NeuroAI Kids
<div class="points">⭐ Points: <span id="points">0</span></div>
</header>

<div class="character">🧸</div>

<div class="chat" id="chat"></div>

<div class="input-area">
<input id="input" placeholder="Ask anything..." />
<button onclick="send()">Send</button>
<button onclick="startVoice()">🎤</button>
<button onclick="openGame()">🎮</button>
</div>

<!-- GAME -->
<div id="gamePanel">
<h2>🎮 Math Game</h2>
<p id="question"></p>
<input id="answer" placeholder="Your answer..." />
<br><br>
<button onclick="checkAnswer()">Submit</button>
</div>

<script>

// 🏆 POINT SYSTEM
let points = 0;

function addPoints(n){
  points += n;
  document.getElementById("points").innerText = points;
}

// 🧠 SESSION
let sessionId = localStorage.getItem("kidsSession");
if (!sessionId) {
  sessionId = "kids-" + Math.random().toString(36).substring(2);
  localStorage.setItem("kidsSession", sessionId);
}

// 💬 ADD MESSAGE
function addMessage(text, sender){
  const chat = document.getElementById("chat");
  const msg = document.createElement("div");
  msg.className = "message " + sender;
  msg.innerText = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

// 🔊 SPEAK
function speak(text){
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-US";
  window.speechSynthesis.speak(speech);
}

// 🚀 SEND MESSAGE
async function send(){
  const input = document.getElementById("input");
  const text = input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value = "";

  const loading = document.createElement("div");
  loading.className = "message ai";
  loading.innerText = "Thinking...";
  document.getElementById("chat").appendChild(loading);

  try{
    const res = await fetch("https://neuroai-backend-2.onrender.com/api/ask",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        message: text,
        mode: "kids",
        sessionId: sessionId
      })
    });

    const data = await res.json();
    loading.remove();

    const reply = data.reply || "No response";

    addMessage(reply,"ai");

    // 🔊 SPEAK RESPONSE
    speak(reply);

    // 🏆 GIVE POINTS
    addPoints(5);

  }catch{
    loading.remove();
    addMessage("⚠️ Error","ai");
  }
}

// 🎤 VOICE INPUT
function startVoice(){
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-US";

  recognition.onresult = function(event){
    const text = event.results[0][0].transcript;
    document.getElementById("input").value = text;
    send();
  };

  recognition.start();
}

// 🎮 GAME
let correctAnswer = 0;

function openGame(){
  document.getElementById("gamePanel").style.display = "block";
  generateQuestion();
}

function generateQuestion(){
  const a = Math.floor(Math.random()*10);
  const b = Math.floor(Math.random()*10);
  correctAnswer = a + b;

  document.getElementById("question").innerText = `What is ${a} + ${b}?`;
}

function checkAnswer(){
  const userAnswer = document.getElementById("answer").value;

  if(parseInt(userAnswer) === correctAnswer){
    alert("🎉 Correct!");
    addPoints(10);
  } else {
    alert("❌ Try again!");
  }

  generateQuestion();
}

// ENTER KEY
document.getElementById("input").addEventListener("keypress",function(e){
  if(e.key==="Enter") send();
});

// 👋 WELCOME
addMessage("Hi 👋 I’m your AI friend 🧸! Let's learn and play 🎈","ai");

</script>

</body>
</html>
